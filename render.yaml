services:
  - type: web
    name: rmeti-student-portal
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: FLASK_SECRET_KEY      # renamed from SECRET_KEY
        generateValue: true
      - key: COOKIE_SECURE         # Render serves HTTPS, so turn on secure cookies
        value: "1"
