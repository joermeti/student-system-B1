# Litestream streams the SQLite write-ahead log to Cloudflare R2 in near
# real-time, and restores the database on boot. All values are pulled from
# environment variables set in the Render dashboard.
dbs:
  - path: ${DB_PATH}
    replicas:
      - type: s3
        bucket: ${R2_BUCKET}
        path: rmeti
        endpoint: ${R2_ENDPOINT}            # https://<account_id>.r2.cloudflarestorage.com
        region: auto
        access-key-id: ${R2_ACCESS_KEY_ID}
        secret-access-key: ${R2_SECRET_ACCESS_KEY}
        sync-interval: 1s
